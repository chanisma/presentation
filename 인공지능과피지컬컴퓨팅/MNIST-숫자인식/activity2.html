<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>활동 2: 내가 그린 숫자 인식</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --main: #2196f3;
  --dark: #1565c0;
  --light: #e3f2fd;
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #212121;
  --text2: #616161;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --teal: #00897b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--dark) 0%, var(--main) 50%, var(--teal) 100%);
  color: white;
  padding: 2rem 1.5rem 1.8rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  position: relative;
}
.header p {
  font-size: 0.95rem;
  opacity: 0.9;
  font-weight: 300;
  position: relative;
}
.badges {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 0.8rem;
  position: relative;
}
.badge {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.25);
}

/* Main Layout */
.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}
.panels {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 1.5rem;
  align-items: start;
}

/* Card */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 1rem 1.2rem;
  font-weight: 700;
  font-size: 1rem;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.card-body {
  padding: 1.2rem;
}

/* Drawing Panel */
.drawing-panel { position: sticky; top: 1.5rem; }

.canvas-wrapper {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 0 auto 1rem;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: 0 0 0 3px var(--light), var(--shadow);
  cursor: crosshair;
  touch-action: none;
}
#drawCanvas {
  display: block;
  width: 280px;
  height: 280px;
  background: #000;
  image-rendering: auto;
}
#gridOverlay {
  position: absolute;
  top: 0; left: 0;
  width: 280px;
  height: 280px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#gridOverlay.visible { opacity: 0.25; }

.tools {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.tool-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.tool-group label {
  font-size: 0.8rem;
  color: var(--text2);
  white-space: nowrap;
}
.tool-group input[type="range"] {
  width: 80px;
  accent-color: var(--main);
}
.tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.4rem 0.75rem;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  background: white;
  font-family: inherit;
  font-size: 0.8rem;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.tool-btn:hover { border-color: var(--main); color: var(--main); background: var(--light); }
.tool-btn.active { border-color: var(--main); color: var(--main); background: var(--light); }

.recognize-btn {
  width: 100%;
  padding: 0.9rem;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--dark), var(--main));
  color: white;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  opacity: 0.4;
  pointer-events: none;
  position: relative;
  overflow: hidden;
}
.recognize-btn.active {
  opacity: 1;
  pointer-events: all;
}
.recognize-btn.active:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(33,150,243,0.4);
}
.recognize-btn.processing {
  pointer-events: none;
}
.recognize-btn .spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 0.5rem;
}
.recognize-btn.processing .spinner { display: inline-block; }
.recognize-btn.processing .btn-text { display: none; }
.recognize-btn.processing .btn-processing { display: inline; }
.btn-processing { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Right Panel - Results */
.results-panel { min-height: 200px; }

.placeholder-msg {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text2);
}
.placeholder-msg .icon { font-size: 3rem; margin-bottom: 0.5rem; display: block; }
.placeholder-msg p { font-size: 0.95rem; }

/* Preprocessing */
.preprocess-section { margin-bottom: 1.2rem; }
.preprocess-flow {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  overflow-x: auto;
  padding: 0.5rem 0;
}
.preprocess-step {
  text-align: center;
  flex-shrink: 0;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s ease;
}
.preprocess-step.visible {
  opacity: 1;
  transform: translateY(0);
}
.preprocess-step canvas {
  border: 2px solid var(--light);
  border-radius: 6px;
  display: block;
  margin: 0 auto 0.3rem;
  image-rendering: pixelated;
}
.preprocess-step .label {
  font-size: 0.7rem;
  color: var(--text2);
}
.arrow {
  font-size: 1.2rem;
  color: var(--main);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.arrow.visible { opacity: 1; }

/* CNN Pipeline */
.cnn-pipeline { margin-bottom: 1.2rem; }
.pipeline-step {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  padding: 0.7rem 0;
  border-bottom: 1px solid #f5f5f5;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.4s ease;
}
.pipeline-step.visible {
  opacity: 1;
  transform: translateX(0);
}
.pipeline-step:last-child { border-bottom: none; }
.step-indicator {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--light);
  color: var(--main);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 0.15rem;
}
.step-indicator.active {
  background: var(--main);
  color: white;
}
.step-content { flex: 1; min-width: 0; }
.step-name {
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.step-desc {
  font-size: 0.75rem;
  color: var(--text2);
  margin-bottom: 0.4rem;
}
.feature-maps {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.feature-maps canvas {
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  image-rendering: pixelated;
}
.dense-viz {
  display: flex;
  gap: 2px;
  align-items: flex-end;
  height: 30px;
}
.dense-bar {
  width: 3px;
  background: var(--main);
  border-radius: 1px 1px 0 0;
  transition: height 0.3s;
}

/* Result */
.result-section { text-align: center; }
.result-big {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
}
.predicted-digit {
  font-size: 4.5rem;
  font-weight: 900;
  color: var(--main);
  line-height: 1;
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.predicted-digit.visible {
  opacity: 1;
  transform: scale(1);
}
.confidence-text {
  font-size: 1.1rem;
  color: var(--text2);
  text-align: left;
}
.confidence-text .pct {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--main);
  display: block;
}

.prob-chart { margin-bottom: 1rem; }
.prob-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.35rem;
}
.prob-label {
  width: 18px;
  font-size: 0.85rem;
  font-weight: 700;
  text-align: center;
  color: var(--text2);
}
.prob-bar-bg {
  flex: 1;
  height: 20px;
  background: #f0f0f0;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.prob-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.34, 1.3, 0.64, 1);
  width: 0;
}
.prob-bar.predicted { background: linear-gradient(90deg, var(--dark), var(--main)); }
.prob-bar.second { background: #90caf9; }
.prob-bar.other { background: #e0e0e0; }
.prob-pct {
  width: 42px;
  font-size: 0.75rem;
  text-align: right;
  color: var(--text2);
}

.ai-comment {
  background: var(--light);
  border-radius: var(--radius-sm);
  padding: 0.8rem 1rem;
  font-size: 0.85rem;
  color: var(--dark);
  text-align: left;
  line-height: 1.5;
}
.ai-comment strong { display: block; margin-bottom: 0.2rem; }

/* History */
.history-section {
  margin-top: 1.5rem;
}
.history-scroll {
  display: flex;
  gap: 0.8rem;
  overflow-x: auto;
  padding: 0.5rem 0;
  -webkit-overflow-scrolling: touch;
}
.history-item {
  flex-shrink: 0;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s;
  padding: 0.5rem;
  border-radius: var(--radius-sm);
}
.history-item:hover { transform: translateY(-2px); background: var(--light); }
.history-item canvas {
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  display: block;
  margin-bottom: 0.3rem;
  image-rendering: pixelated;
  background: #000;
}
.history-item .digit-label {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--main);
}
.history-item .conf-label {
  font-size: 0.7rem;
  color: var(--text2);
}

/* Footer */
.footer {
  text-align: center;
  padding: 1.5rem;
  margin-top: 1rem;
}
.footer a {
  color: var(--main);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
}
.footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 840px) {
  .panels { grid-template-columns: 1fr; }
  .drawing-panel { position: static; }
  .canvas-wrapper { margin: 0 auto 1rem; }
  .header h1 { font-size: 1.4rem; }
}
@media (max-width: 400px) {
  .canvas-wrapper, #drawCanvas, #gridOverlay {
    width: 250px;
    height: 250px;
  }
  .main-container { padding: 1rem; }
}

/* Scrollbar */
::-webkit-scrollbar { height: 6px; }
::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 3px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* Model Loading Status */
.model-status {
  padding: 0.5rem 0.75rem;
  margin-bottom: 0.8rem;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 500;
  text-align: center;
  transition: all 0.3s;
  display: none;
}
.model-status.loading {
  display: block;
  background: #fff3e0;
  color: #e65100;
  border: 1px solid #ffe0b2;
}
.model-status.ready {
  display: block;
  background: #e8f5e9;
  color: #2e7d32;
  border: 1px solid #c8e6c9;
}
.model-status.error {
  display: block;
  background: #fce4ec;
  color: #c62828;
  border: 1px solid #f8bbd0;
}
.model-status .progress-bar {
  height: 4px;
  background: #ffe0b2;
  border-radius: 2px;
  margin-top: 0.4rem;
  overflow: hidden;
}
.model-status .progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff9800, #f57c00);
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}
</style>
</head>
<body>

<header class="header">
  <h1>&#9999;&#65039; &#45236;&#44032; &#44536;&#47536; &#49707;&#51088; &#51064;&#49885;</h1>
  <p>직접 숫자를 그려 CNN의 처리 과정을 확인해봅시다</p>
  <div class="badges">
    <span class="badge">손글씨</span>
    <span class="badge">CNN</span>
    <span class="badge">인식</span>
  </div>
</header>

<div class="main-container">
  <div class="panels">
    <!-- Left Panel -->
    <div class="drawing-panel">
      <div class="card">
        <div class="card-header">&#127912; 숫자 그리기</div>
        <div class="card-body">
          <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="drawCanvas" width="280" height="280"></canvas>
            <canvas id="gridOverlay" width="280" height="280"></canvas>
          </div>
          <div class="tools">
            <div class="tool-group">
              <label>굵기</label>
              <input type="range" id="penSize" min="8" max="26" value="16">
            </div>
            <button class="tool-btn" id="undoBtn" title="되돌리기">&#8617;&#65039; 되돌리기</button>
            <button class="tool-btn" id="clearBtn" title="지우기">&#128465;&#65039; 지우기</button>
            <button class="tool-btn" id="gridToggle" title="그리드">&#9638; 그리드</button>
          </div>
          <div class="model-status" id="modelStatus">
            <span id="modelStatusText">모델 준비 중...</span>
            <div class="progress-bar"><div class="progress-fill" id="modelProgress"></div></div>
          </div>
          <button class="recognize-btn" id="recognizeBtn">
            <span class="spinner"></span>
            <span class="btn-text">인식하기 &#128640;</span>
            <span class="btn-processing">처리 중...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="results-panel">
      <div id="placeholderArea">
        <div class="card">
          <div class="card-body placeholder-msg">
            <span class="icon">&#9997;&#65039;</span>
            <p>왼쪽 캔버스에 숫자(0~9)를 그린 후<br><strong>인식하기</strong> 버튼을 눌러보세요!</p>
          </div>
        </div>
      </div>

      <div id="resultsArea" style="display:none;">
        <!-- Preprocessing -->
        <div class="card preprocess-section">
          <div class="card-header">&#128270; 전처리 (Preprocessing)</div>
          <div class="card-body">
            <div class="preprocess-flow" id="preprocessFlow">
              <div class="preprocess-step" id="ppStep1">
                <canvas id="ppOriginal" width="56" height="56"></canvas>
                <div class="label">원본 (280x280)</div>
              </div>
              <div class="arrow">&#10142;</div>
              <div class="preprocess-step" id="ppStep2">
                <canvas id="ppScaled" width="56" height="56"></canvas>
                <div class="label">축소 (28x28)</div>
              </div>
              <div class="arrow">&#10142;</div>
              <div class="preprocess-step" id="ppStep3">
                <canvas id="ppCentered" width="56" height="56" style="image-rendering:pixelated;"></canvas>
                <div class="label">정규화 완료</div>
              </div>
            </div>
          </div>
        </div>

        <!-- CNN Pipeline -->
        <div class="card cnn-pipeline">
          <div class="card-header">&#129504; CNN 처리 과정</div>
          <div class="card-body" id="pipelineBody"></div>
        </div>

        <!-- Result -->
        <div class="card result-section">
          <div class="card-header">&#127919; 인식 결과</div>
          <div class="card-body">
            <div class="result-big">
              <div class="predicted-digit" id="predictedDigit">0</div>
              <div class="confidence-text">
                <span class="pct" id="confidencePct">0%</span>
                확신도
              </div>
            </div>
            <div class="prob-chart" id="probChart"></div>
            <div class="ai-comment" id="aiComment">
              <strong>&#129302; AI의 판단</strong>
              <span id="aiText"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="card history-section" id="historySection" style="display:none;">
        <div class="card-header">&#128218; 인식 기록</div>
        <div class="card-body">
          <div class="history-scroll" id="historyScroll"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <a href="index.html#last">&larr; 프레젠테이션으로 돌아가기</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script>
(() => {
'use strict';

console.log('[MNIST] Script started, tf available:', typeof tf !== 'undefined');

// ===================== CANVAS DRAWING =====================
const displayCanvas = document.getElementById('drawCanvas');
const ctx = displayCanvas.getContext('2d');
const gridOverlay = document.getElementById('gridOverlay');
const gridCtx = gridOverlay.getContext('2d');

let isDrawing = false;
let hasDrawing = false;
let strokes = []; // array of strokes, each stroke is array of points
let currentStroke = [];

// Init canvas
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, 280, 280);
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.strokeStyle = '#fff';

// Draw grid overlay
function drawGrid() {
  gridCtx.clearRect(0, 0, 280, 280);
  gridCtx.strokeStyle = '#4fc3f7';
  gridCtx.lineWidth = 0.3;
  const step = 280 / 28;
  for (let i = 1; i < 28; i++) {
    gridCtx.beginPath();
    gridCtx.moveTo(i * step, 0);
    gridCtx.lineTo(i * step, 280);
    gridCtx.stroke();
    gridCtx.beginPath();
    gridCtx.moveTo(0, i * step);
    gridCtx.lineTo(280, i * step);
    gridCtx.stroke();
  }
}
drawGrid();

// Pointer events
function getPos(e) {
  const rect = displayCanvas.getBoundingClientRect();
  const scaleX = 280 / rect.width;
  const scaleY = 280 / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  return { x, y };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  currentStroke = [];
  const pos = getPos(e);
  currentStroke.push(pos);
  ctx.lineWidth = parseInt(document.getElementById('penSize').value);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  currentStroke.push(pos);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke.length > 0) {
    strokes.push({
      points: currentStroke,
      lineWidth: parseInt(document.getElementById('penSize').value)
    });
    currentStroke = [];
    hasDrawing = true;
    document.getElementById('recognizeBtn').classList.add('active');
  }
}

displayCanvas.addEventListener('pointerdown', startDraw);
displayCanvas.addEventListener('pointermove', draw);
displayCanvas.addEventListener('pointerup', endDraw);
displayCanvas.addEventListener('pointerleave', endDraw);

// Redraw all strokes
function redrawStrokes() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 280, 280);
  ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const stroke of strokes) {
    if (stroke.points.length < 1) continue;
    ctx.lineWidth = stroke.lineWidth;
    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length; i++) {
      ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
    }
    ctx.stroke();
  }
}

// Buttons
document.getElementById('clearBtn').addEventListener('click', () => {
  strokes = [];
  hasDrawing = false;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 280, 280);
  document.getElementById('recognizeBtn').classList.remove('active');
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (strokes.length === 0) return;
  strokes.pop();
  redrawStrokes();
  if (strokes.length === 0) {
    hasDrawing = false;
    document.getElementById('recognizeBtn').classList.remove('active');
  }
});

document.getElementById('gridToggle').addEventListener('click', function() {
  gridOverlay.classList.toggle('visible');
  this.classList.toggle('active');
});

// ===================== PREPROCESSING =====================
function getPixelData() {
  // Get display canvas image data
  const imgData = ctx.getImageData(0, 0, 280, 280);

  // Step 1: Find bounding box of the drawing on the 280x280 canvas
  const srcData = imgData.data;
  let sMinR = 279, sMaxR = 0, sMinC = 279, sMaxC = 0;
  let hasPixel = false;
  for (let r = 0; r < 280; r++) {
    for (let c = 0; c < 280; c++) {
      if (srcData[(r * 280 + c) * 4] > 30) { // R channel
        hasPixel = true;
        sMinR = Math.min(sMinR, r);
        sMaxR = Math.max(sMaxR, r);
        sMinC = Math.min(sMinC, c);
        sMaxC = Math.max(sMaxC, c);
      }
    }
  }

  // Step 2: Crop to bounding box, then place in 20x20 area centered in 28x28
  // (MNIST digits are ~20x20 centered in 28x28 with 4px padding)
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 28;
  tempCanvas.height = 28;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.fillStyle = 'black';
  tempCtx.fillRect(0, 0, 28, 28);

  if (hasPixel) {
    const cropW = sMaxC - sMinC + 1;
    const cropH = sMaxR - sMinR + 1;
    // Fit into 20x20 area, maintaining aspect ratio
    const scale = Math.min(20 / cropW, 20 / cropH);
    const dw = cropW * scale;
    const dh = cropH * scale;
    const dx = (28 - dw) / 2;
    const dy = (28 - dh) / 2;
    tempCtx.imageSmoothingEnabled = true;
    tempCtx.imageSmoothingQuality = 'high';
    tempCtx.drawImage(displayCanvas, sMinC, sMinR, cropW, cropH, dx, dy, dw, dh);
  } else {
    tempCtx.drawImage(displayCanvas, 0, 0, 28, 28);
  }

  const small = tempCtx.getImageData(0, 0, 28, 28);

  // Extract grayscale and normalize
  const pixels = new Float32Array(784);
  for (let i = 0; i < 784; i++) {
    pixels[i] = small.data[i * 4] / 255.0; // R channel (white on black)
  }

  // Center by center of mass (fine-tune after the bounding-box centering)
  const centered = centerDigit(pixels);

  return { original: imgData, scaled: small, centered };
}

function centerDigit(pixels) {
  // Find bounding box
  let minR = 27, maxR = 0, minC = 27, maxC = 0;
  let found = false;
  for (let r = 0; r < 28; r++) {
    for (let c = 0; c < 28; c++) {
      if (pixels[r * 28 + c] > 0.15) {
        found = true;
        minR = Math.min(minR, r);
        maxR = Math.max(maxR, r);
        minC = Math.min(minC, c);
        maxC = Math.max(maxC, c);
      }
    }
  }
  if (!found) return pixels;

  // Center of mass
  let sumR = 0, sumC = 0, sumW = 0;
  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) {
      const v = pixels[r * 28 + c];
      sumR += r * v;
      sumC += c * v;
      sumW += v;
    }
  }
  if (sumW < 0.01) return pixels;
  const comR = Math.round(sumR / sumW);
  const comC = Math.round(sumC / sumW);
  const shiftR = 14 - comR;
  const shiftC = 14 - comC;

  const result = new Float32Array(784);
  for (let r = 0; r < 28; r++) {
    for (let c = 0; c < 28; c++) {
      const srcR = r - shiftR;
      const srcC = c - shiftC;
      if (srcR >= 0 && srcR < 28 && srcC >= 0 && srcC < 28) {
        result[r * 28 + c] = pixels[srcR * 28 + srcC];
      }
    }
  }
  return result;
}

// ===================== CNN OPERATIONS =====================
function convolve(input, h, w, kernel) {
  const kh = kernel.length, kw = kernel[0].length;
  const ph = Math.floor(kh / 2), pw = Math.floor(kw / 2);
  const oh = h - kh + 1, ow = w - kw + 1;
  const output = new Float32Array(oh * ow);
  for (let r = 0; r < oh; r++) {
    for (let c = 0; c < ow; c++) {
      let sum = 0;
      for (let kr = 0; kr < kh; kr++) {
        for (let kc = 0; kc < kw; kc++) {
          sum += input[(r + kr) * w + (c + kc)] * kernel[kr][kc];
        }
      }
      output[r * ow + c] = sum;
    }
  }
  return { data: output, h: oh, w: ow };
}

function relu(data) {
  const out = new Float32Array(data.length);
  for (let i = 0; i < data.length; i++) out[i] = Math.max(0, data[i]);
  return out;
}

function maxPool(data, h, w, size = 2) {
  const oh = Math.floor(h / size), ow = Math.floor(w / size);
  const out = new Float32Array(oh * ow);
  for (let r = 0; r < oh; r++) {
    for (let c = 0; c < ow; c++) {
      let maxVal = -Infinity;
      for (let pr = 0; pr < size; pr++) {
        for (let pc = 0; pc < size; pc++) {
          maxVal = Math.max(maxVal, data[(r * size + pr) * w + (c * size + pc)]);
        }
      }
      out[r * ow + c] = maxVal;
    }
  }
  return { data: out, h: oh, w: ow };
}

const kernels1 = [
  [[-1,-1,-1],[0,0,0],[1,1,1]],       // horizontal edges
  [[-1,0,1],[-1,0,1],[-1,0,1]],       // vertical edges
  [[-1,-1,0],[-1,0,1],[0,1,1]]        // diagonal
];

const kernels2 = [
  [[0,1,0],[1,-4,1],[0,1,0]],          // Laplacian (blob)
  [[1,1,1],[1,-8,1],[1,1,1]],          // edge enhance
  [[-1,2,-1],[-1,2,-1],[-1,2,-1]],     // vertical line
  [[0,-1,0],[1,2,1],[0,-1,0]]          // cross
];

function processCNN(pixels) {
  // Conv1
  const conv1Results = kernels1.map(k => convolve(pixels, 28, 28, k));
  // ReLU1
  const relu1Results = conv1Results.map(r => ({ data: relu(r.data), h: r.h, w: r.w }));
  // MaxPool1
  const pool1Results = relu1Results.map(r => maxPool(r.data, r.h, r.w));

  // Conv2 on first pool result
  const conv2Results = kernels2.map(k => convolve(pool1Results[0].data, pool1Results[0].h, pool1Results[0].w, k));
  // ReLU2
  const relu2Results = conv2Results.map(r => ({ data: relu(r.data), h: r.h, w: r.w }));
  // MaxPool2
  const pool2Results = relu2Results.map(r => maxPool(r.data, r.h, r.w));

  // Flatten
  let flatLen = 0;
  pool2Results.forEach(r => flatLen += r.data.length);
  const flat = new Float32Array(flatLen);
  let offset = 0;
  pool2Results.forEach(r => { flat.set(r.data, offset); offset += r.data.length; });

  // Dense layer sim
  const dense = new Float32Array(32);
  for (let i = 0; i < 32; i++) {
    let sum = 0;
    for (let j = 0; j < flat.length; j++) {
      sum += flat[j] * Math.sin((i + 1) * (j + 1) * 0.1);
    }
    dense[i] = Math.max(0, sum / flat.length);
  }

  return {
    conv1: conv1Results,
    relu1: relu1Results,
    pool1: pool1Results,
    conv2: conv2Results,
    relu2: relu2Results,
    pool2: pool2Results,
    flat,
    dense
  };
}

// Online pre-trained MNIST model sources (tried in order)
const MODEL_URLS = [
  './model/model.json',
  'https://raw.githubusercontent.com/google/tfjs-mnist-workshop/master/model/model.json',
];

async function loadModel() {
  showLoadingStatus('학습된 모델을 불러오는 중...', 10);

  // Try each model source in order (no IndexedDB cache - always load fresh)
  for (let i = 0; i < MODEL_URLS.length; i++) {
    const url = MODEL_URLS[i];
    try {
      showLoadingStatus(`모델 로딩 중... (소스 ${i + 1}/${MODEL_URLS.length})`, 20 + i * 25);
      console.log('[MNIST] Trying model source:', url);
      tfModel = await tf.loadLayersModel(url);

      // Log model info
      console.log('[MNIST] Model loaded from:', url);
      console.log('[MNIST] Input shape:', tfModel.inputs[0].shape);
      console.log('[MNIST] Output shape:', tfModel.outputs[0].shape);

      modelReady = true;
      showModelReady();
      return;
    } catch(e) {
      console.log('[MNIST] Failed to load from', url, ':', e.message);
    }
  }

  // All sources failed
  showModelError('모델 로딩 실패 - 템플릿 매칭 모드로 동작합니다');
  console.log('[MNIST] All model sources failed. Template matching will be used.');
}

// Gaussian blur for preprocessing drawn input
function gaussianBlurPixels(p) {
  const k = [[1,2,1],[2,4,2],[1,2,1]];
  const kSum = 16;
  const out = new Float32Array(784);
  // Copy edges
  for (let i = 0; i < 784; i++) out[i] = p[i];
  for (let r = 1; r < 27; r++) {
    for (let c = 1; c < 27; c++) {
      let sum = 0;
      for (let kr = -1; kr <= 1; kr++) {
        for (let kc = -1; kc <= 1; kc++) {
          sum += p[(r+kr)*28+(c+kc)] * k[kr+1][kc+1];
        }
      }
      out[r*28+c] = sum / kSum;
    }
  }
  return out;
}

async function predictWithModel(pixels) {
  // Apply Gaussian blur twice to soften hard edges (makes drawn input more MNIST-like)
  const blurred = gaussianBlurPixels(gaussianBlurPixels(pixels));

  if (!tfModel) {
    // TF model not available, use template matching fallback
    return improvedTemplateMatch(blurred);
  }

  // Auto-detect model input shape and adapt
  const inputShape = tfModel.inputs[0].shape; // e.g. [null,28,28,1] or [null,784]
  let input;
  if (inputShape.length === 4) {
    // CNN model expects [batch, 28, 28, 1]
    input = tf.tensor4d(Array.from(blurred), [1, 28, 28, 1]);
  } else {
    // Dense model expects [batch, 784] (flattened)
    input = tf.tensor2d(Array.from(blurred), [1, 784]);
  }

  const pred = tfModel.predict(input);
  const probs = await pred.data();
  input.dispose();
  pred.dispose();
  return Array.from(probs);
}

// ===================== IMPROVED TEMPLATE MATCHING FALLBACK =====================
function improvedTemplateMatch(pixels) {
  // Generate reference templates with thick strokes
  const templates = generateMatchTemplates();

  // For each digit, compute max normalized cross-correlation across all its templates
  const scores = new Float32Array(10);
  for (let digit = 0; digit <= 9; digit++) {
    let maxCorr = -Infinity;
    for (const template of templates[digit]) {
      const corr = normalizedCrossCorrelation(pixels, template);
      maxCorr = Math.max(maxCorr, corr);
    }
    scores[digit] = maxCorr;
  }

  // Softmax with temperature
  const temp = 5;
  const maxScore = Math.max(...scores);
  const expScores = Array.from(scores).map(s => Math.exp((s - maxScore) * temp));
  const sumExp = expScores.reduce((a, b) => a + b, 0);
  return expScores.map(s => s / sumExp);
}

function normalizedCrossCorrelation(a, b) {
  let sumA = 0, sumB = 0, sumAB = 0, sumA2 = 0, sumB2 = 0;
  const n = a.length;
  for (let i = 0; i < n; i++) {
    sumA += a[i]; sumB += b[i];
    sumAB += a[i] * b[i];
    sumA2 += a[i] * a[i];
    sumB2 += b[i] * b[i];
  }
  const meanA = sumA / n, meanB = sumB / n;
  let num = 0, denA = 0, denB = 0;
  for (let i = 0; i < n; i++) {
    const da = a[i] - meanA, db = b[i] - meanB;
    num += da * db;
    denA += da * da;
    denB += db * db;
  }
  const den = Math.sqrt(denA * denB);
  return den < 0.0001 ? 0 : num / den;
}

// Cache for generated match templates
let _matchTemplatesCache = null;

function generateMatchTemplates() {
  if (_matchTemplatesCache) return _matchTemplatesCache;

  const templates = {};
  const blurKernel = [[1,2,1],[2,4,2],[1,2,1]];
  const blurSum = 16;

  function setPixelThick(p, x, y, v) {
    for (let dr = -2; dr <= 2; dr++) {
      for (let dc = -2; dc <= 2; dc++) {
        const nr = y + dr, nc = x + dc;
        if (nr >= 0 && nr < 28 && nc >= 0 && nc < 28) {
          const dist = Math.sqrt(dr*dr + dc*dc);
          if (dist > 2.5) continue;
          const val = v * Math.max(0, 1 - dist * 0.3);
          p[nr * 28 + nc] = Math.min(1, p[nr * 28 + nc] + val);
        }
      }
    }
  }

  function drawLine(p, x1, y1, x2, y2) {
    const steps = Math.max(Math.abs(x2-x1), Math.abs(y2-y1)) * 2;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = Math.round(x1 + (x2 - x1) * t);
      const y = Math.round(y1 + (y2 - y1) * t);
      setPixelThick(p, x, y, 1.2);
    }
  }

  function drawOval(p, cx, cy, rx, ry) {
    for (let a = 0; a < Math.PI * 2; a += 0.04) {
      const x = Math.round(cx + rx * Math.cos(a));
      const y = Math.round(cy + ry * Math.sin(a));
      setPixelThick(p, x, y, 1.0);
    }
  }

  function drawArc(p, cx, cy, r, startA, endA) {
    const steps = Math.abs(endA - startA) / 0.04;
    for (let i = 0; i <= steps; i++) {
      const a = startA + (endA - startA) * (i / steps);
      const x = Math.round(cx + r * Math.cos(a));
      const y = Math.round(cy + r * Math.sin(a));
      setPixelThick(p, x, y, 1.0);
    }
  }

  function blurImage(p) {
    const out = new Float32Array(784);
    for (let i = 0; i < 784; i++) out[i] = p[i];
    for (let r = 1; r < 27; r++) {
      for (let c = 1; c < 27; c++) {
        let sum = 0;
        for (let kr = -1; kr <= 1; kr++) {
          for (let kc = -1; kc <= 1; kc++) {
            sum += p[(r+kr)*28+(c+kc)] * blurKernel[kr+1][kc+1];
          }
        }
        out[r*28+c] = sum / blurSum;
      }
    }
    return out;
  }

  const templateDefs = {
    0: [
      (p) => { drawOval(p, 14, 14, 8, 11); },
      (p) => { drawOval(p, 14, 14, 7, 10); },
      (p) => { drawOval(p, 14, 14, 9, 12); },
      (p) => { drawOval(p, 14, 14, 6, 10); },
      (p) => { drawOval(p, 14, 13, 8, 10); },
      (p) => { drawOval(p, 13, 14, 8, 11); },
      (p) => { drawOval(p, 15, 14, 7, 10); },
      (p) => { drawOval(p, 14, 15, 7, 11); },
    ],
    1: [

      (p) => { drawLine(p, 13, 3, 13, 25); },
      (p) => { drawLine(p, 15, 4, 15, 24); drawLine(p, 11, 8, 15, 4); drawLine(p, 10, 24, 20, 24); },

      (p) => { drawLine(p, 14, 4, 14, 24); drawLine(p, 12, 7, 14, 4); drawLine(p, 10, 24, 18, 24); },

      (p) => { drawLine(p, 6, 5, 22, 5); drawLine(p, 22, 5, 11, 25); },
      (p) => { drawLine(p, 7, 4, 21, 4); drawLine(p, 21, 4, 14, 24); },
      (p) => { drawLine(p, 8, 4, 20, 4); drawLine(p, 20, 4, 12, 25); },
      (p) => { drawLine(p, 6, 4, 22, 4); drawLine(p, 22, 4, 13, 24); drawLine(p, 11, 14, 18, 14); },
    ],
    8: [
      (p) => { drawOval(p, 14, 9, 6, 6); drawOval(p, 14, 19, 7, 7); },
      (p) => { drawOval(p, 14, 9, 7, 6); drawOval(p, 14, 20, 7, 6); },
      (p) => { drawOval(p, 14, 9, 6, 5); drawOval(p, 14, 19, 7, 6); },
      (p) => { drawOval(p, 14, 10, 6, 6); drawOval(p, 14, 20, 6, 6); },
      (p) => { drawOval(p, 14, 9, 5, 6); drawOval(p, 14, 19, 6, 7); },
      (p) => { drawOval(p, 13, 9, 6, 6); drawOval(p, 13, 19, 7, 7); },
      (p) => { drawOval(p, 15, 9, 6, 6); drawOval(p, 15, 19, 7, 7); },
      (p) => { drawOval(p, 14, 8, 7, 5); drawOval(p, 14, 18, 7, 7); },
    ],
    9: [
      (p) => { drawOval(p, 14, 10, 7, 7); drawLine(p, 21, 12, 14, 25); },
      (p) => { drawOval(p, 14, 10, 7, 7); drawLine(p, 20, 14, 12, 25); },
      (p) => { drawOval(p, 14, 10, 6, 6); drawLine(p, 20, 13, 14, 24); },
      (p) => { drawOval(p, 14, 9, 7, 6); drawLine(p, 21, 11, 13, 25); },
      (p) => { drawOval(p, 14, 10, 7, 7); drawArc(p, 18, 17, 6, -Math.PI*0.2, Math.PI*0.7); },
      (p) => { drawOval(p, 13, 10, 7, 7); drawLine(p, 20, 13, 13, 25); },
      (p) => { drawOval(p, 15, 10, 7, 7); drawLine(p, 22, 12, 14, 25); },
      (p) => { drawOval(p, 14, 9, 6, 7); drawLine(p, 20, 12, 12, 24); },
    ]
  };

  for (let digit = 0; digit <= 9; digit++) {
    templates[digit] = [];
    const defs = templateDefs[digit];
    for (const tpl of defs) {
      const p = new Float32Array(784);
      tpl(p);
      templates[digit].push(blurImage(p));
    }
  }

  _matchTemplatesCache = templates;
  return templates;
}

// ===================== VISUALIZATION =====================
function renderToCanvas(canvasEl, data, h, w, scale = 1) {
  canvasEl.width = w * scale;
  canvasEl.height = h * scale;
  const tctx = canvasEl.getContext('2d');
  const imgData = tctx.createImageData(w, h);

  // Normalize
  let maxVal = 0;
  for (let i = 0; i < data.length; i++) maxVal = Math.max(maxVal, Math.abs(data[i]));
  if (maxVal < 0.001) maxVal = 1;

  for (let i = 0; i < data.length; i++) {
    const v = data[i] / maxVal;
    const idx = i * 4;
    if (v >= 0) {
      imgData.data[idx] = Math.round(v * 255);
      imgData.data[idx + 1] = Math.round(v * 255);
      imgData.data[idx + 2] = Math.round(v * 255);
    } else {
      imgData.data[idx] = 0;
      imgData.data[idx + 1] = 0;
      imgData.data[idx + 2] = Math.round(-v * 180);
    }
    imgData.data[idx + 3] = 255;
  }

  // Draw at native then scale
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').putImageData(imgData, 0, 0);
  tctx.imageSmoothingEnabled = false;
  tctx.drawImage(tmp, 0, 0, w * scale, h * scale);
}

function renderPixels28(canvasEl, pixels, size = 56) {
  canvasEl.width = size;
  canvasEl.height = size;
  const tctx = canvasEl.getContext('2d');
  const tmp = document.createElement('canvas');
  tmp.width = 28; tmp.height = 28;
  const tmpCtx = tmp.getContext('2d');
  const imgData = tmpCtx.createImageData(28, 28);
  for (let i = 0; i < 784; i++) {
    const v = Math.round(pixels[i] * 255);
    imgData.data[i*4] = v;
    imgData.data[i*4+1] = v;
    imgData.data[i*4+2] = v;
    imgData.data[i*4+3] = 255;
  }
  tmpCtx.putImageData(imgData, 0, 0);
  tctx.imageSmoothingEnabled = false;
  tctx.drawImage(tmp, 0, 0, size, size);
}

function buildPipeline(cnnResult) {
  const body = document.getElementById('pipelineBody');
  body.innerHTML = '';

  const steps = [
    { name: '입력 이미지', desc: '28 x 28 그레이스케일', type: 'input' },
    { name: 'Conv Layer 1', desc: '3x3 필터 3개 적용 (가로/세로/대각선 엣지)', type: 'conv1', data: cnnResult.conv1 },
    { name: 'ReLU 활성화', desc: '음수 값 제거 → 중요한 특징만 남김', type: 'relu1', data: cnnResult.relu1 },
    { name: 'MaxPooling', desc: '2x2 영역 최대값 → 크기 절반으로', type: 'pool1', data: cnnResult.pool1 },
    { name: 'Conv Layer 2', desc: '더 복잡한 패턴 감지 (모서리, 곡선)', type: 'conv2', data: cnnResult.conv2 },
    { name: 'ReLU 2', desc: '음수 값 제거', type: 'relu2', data: cnnResult.relu2 },
    { name: 'MaxPooling 2', desc: '추가 다운샘플링', type: 'pool2', data: cnnResult.pool2 },
    { name: 'Flatten', desc: '2D → 1D 벡터 변환', type: 'flat', data: cnnResult.flat },
    { name: 'Dense Layer', desc: '완전연결 → 숫자별 점수 계산', type: 'dense', data: cnnResult.dense },
  ];

  steps.forEach((step, idx) => {
    const div = document.createElement('div');
    div.className = 'pipeline-step';
    div.style.transitionDelay = `${idx * 150}ms`;

    let visualHTML = '';
    if (step.type === 'input') {
      visualHTML = '<div class="feature-maps"><canvas class="pipe-input" width="42" height="42"></canvas></div>';
    } else if (['conv1','relu1','pool1','conv2','relu2','pool2'].includes(step.type)) {
      const n = step.data.length;
      visualHTML = '<div class="feature-maps">' +
        step.data.map((_, i) => `<canvas class="fmap-${step.type}-${i}" width="42" height="42"></canvas>`).join('') +
        '</div>';
    } else if (step.type === 'flat') {
      visualHTML = '<div style="font-size:0.75rem;color:var(--text2);">' +
        `${step.data.length}개의 값으로 펼침</div>`;
    } else if (step.type === 'dense') {
      visualHTML = '<div class="dense-viz" id="denseViz"></div>';
    }

    div.innerHTML = `
      <div class="step-indicator">${idx + 1}</div>
      <div class="step-content">
        <div class="step-name">${step.name}</div>
        <div class="step-desc">${step.desc}</div>
        ${visualHTML}
      </div>`;
    body.appendChild(div);
  });

  return steps;
}

// ===================== HISTORY =====================
const history = [];

function addToHistory(imageData, predicted, confidence, cnnResult, probs, centered) {
  const item = { imageData, predicted, confidence, cnnResult, probs, centered };
  history.unshift(item);
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const scroll = document.getElementById('historyScroll');
  section.style.display = history.length > 0 ? 'block' : 'none';
  scroll.innerHTML = '';

  history.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <canvas width="56" height="56"></canvas>
      <div class="digit-label">${item.predicted}</div>
      <div class="conf-label">${(item.confidence * 100).toFixed(0)}%</div>`;
    const c = div.querySelector('canvas');
    renderPixels28(c, item.centered, 56);
    scroll.appendChild(div);
  });
}

// ===================== AI COMMENT =====================
function getAIComment(predicted, probs) {
  const sorted = probs.map((p, i) => ({ digit: i, prob: p })).sort((a, b) => b.prob - a.prob);
  const top = sorted[0];
  const second = sorted[1];

  const featureHints = {
    0: '둥근 타원 모양과 내부 빈 공간이 감지되었습니다.',
    1: '세로 방향의 직선 패턴이 강하게 나타났습니다.',
    2: '상단의 곡선과 하단의 수평선 패턴이 감지되었습니다.',
    3: '오른쪽으로 열린 두 개의 곡선 구조가 감지되었습니다.',
    4: '수직선과 수평선이 만나는 각진 패턴이 나타났습니다.',
    5: '상단 수평선과 하단 곡선의 조합이 감지되었습니다.',
    6: '하단의 둥근 고리와 상단 곡선이 나타났습니다.',
    7: '상단 수평선에서 대각선으로 이어지는 패턴이 감지되었습니다.',
    8: '상하 두 개의 둥근 고리 구조가 감지되었습니다.',
    9: '상단의 둥근 고리와 하단의 직선/곡선이 나타났습니다.'
  };

  let text = featureHints[predicted];
  if (second.prob > 0.15) {
    text += ` 숫자 ${second.digit}과(와) 유사한 특징도 일부 발견되었습니다 (${(second.prob * 100).toFixed(0)}%).`;
  }
  if (top.prob < 0.5) {
    text += ' 확신도가 낮으니 더 크고 명확하게 그려보세요!';
  }
  return text;
}

// ===================== MAIN RECOGNITION =====================
document.getElementById('recognizeBtn').addEventListener('click', async () => {
  if (!hasDrawing) return;

  const btn = document.getElementById('recognizeBtn');
  btn.classList.add('processing');

  // Get pixel data
  const { original, scaled, centered } = getPixelData();

  // Process CNN visualization
  const cnnResult = processCNN(centered);

  // Predict
  let probs;
  try {
    probs = await predictWithModel(centered);
  } catch(e) {
    probs = improvedTemplateMatch(centered);
  }

  const maxIdx = probs.indexOf(Math.max(...probs));
  const confidence = probs[maxIdx];

  // Show results
  document.getElementById('placeholderArea').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'block';

  // Animate preprocessing
  await animatePreprocessing(centered);

  // Build and animate pipeline
  const steps = buildPipeline(cnnResult);
  await animatePipeline(cnnResult, centered);

  // Animate result
  await animateResult(maxIdx, confidence, probs);

  // Add to history
  addToHistory(original, maxIdx, confidence, cnnResult, probs, centered);

  btn.classList.remove('processing');
});

async function animatePreprocessing(centered) {
  const ppOrig = document.getElementById('ppOriginal');
  const ppOrigCtx = ppOrig.getContext('2d');
  ppOrigCtx.drawImage(displayCanvas, 0, 0, 56, 56);

  const ppScaled = document.getElementById('ppScaled');
  renderPixels28(ppScaled, centered, 56);

  const ppCentered = document.getElementById('ppCentered');
  renderPixels28(ppCentered, centered, 56);

  const stepEls = document.querySelectorAll('.preprocess-step');
  const arrowEls = document.querySelectorAll('.arrow');

  for (let i = 0; i < stepEls.length; i++) {
    await delay(200);
    stepEls[i].classList.add('visible');
    if (i < arrowEls.length) arrowEls[i].classList.add('visible');
  }
}

async function animatePipeline(cnnResult, centered) {
  const stepEls = document.querySelectorAll('.pipeline-step');

  for (let i = 0; i < stepEls.length; i++) {
    await delay(150);
    stepEls[i].classList.add('visible');
    stepEls[i].querySelector('.step-indicator').classList.add('active');

    // Render feature maps
    if (i === 0) {
      const c = stepEls[i].querySelector('.pipe-input');
      if (c) renderPixels28(c, centered, 42);
    }

    const types = ['conv1','relu1','pool1','conv2','relu2','pool2'];
    for (const type of types) {
      const maps = cnnResult[type];
      if (!maps) continue;
      maps.forEach((map, j) => {
        const c = stepEls[i].querySelector(`.fmap-${type}-${j}`);
        if (c) {
          const scale = Math.max(1, Math.round(42 / map.w));
          renderToCanvas(c, map.data, map.h, map.w, scale);
        }
      });
    }

    // Dense viz
    if (i === stepEls.length - 1) {
      const denseViz = document.getElementById('denseViz');
      if (denseViz && cnnResult.dense) {
        const maxD = Math.max(...cnnResult.dense);
        denseViz.innerHTML = '';
        cnnResult.dense.forEach(v => {
          const bar = document.createElement('div');
          bar.className = 'dense-bar';
          bar.style.height = `${(v / (maxD || 1)) * 28}px`;
          bar.style.opacity = Math.max(0.2, v / (maxD || 1));
          denseViz.appendChild(bar);
        });
      }
    }
  }
}

async function animateResult(predicted, confidence, probs) {
  // Predicted digit
  const digitEl = document.getElementById('predictedDigit');
  digitEl.textContent = predicted;
  digitEl.classList.remove('visible');
  await delay(100);
  digitEl.classList.add('visible');

  // Confidence
  document.getElementById('confidencePct').textContent = `${(confidence * 100).toFixed(1)}%`;

  // Probability chart
  const chart = document.getElementById('probChart');
  chart.innerHTML = '';
  const sorted = probs.map((p, i) => ({ digit: i, prob: p })).sort((a, b) => b.prob - a.prob);
  const secondProb = sorted[1].prob;

  for (let d = 0; d <= 9; d++) {
    const row = document.createElement('div');
    row.className = 'prob-row';
    const cls = d === predicted ? 'predicted' : (probs[d] >= secondProb && probs[d] > 0.1 ? 'second' : 'other');
    row.innerHTML = `
      <div class="prob-label" style="${d === predicted ? 'color:var(--main);' : ''}">${d}</div>
      <div class="prob-bar-bg"><div class="prob-bar ${cls}" id="bar-${d}"></div></div>
      <div class="prob-pct">${(probs[d] * 100).toFixed(1)}%</div>`;
    chart.appendChild(row);
  }

  // Animate bars
  await delay(50);
  for (let d = 0; d <= 9; d++) {
    const bar = document.getElementById(`bar-${d}`);
    bar.style.width = `${probs[d] * 100}%`;
  }

  // AI comment
  document.getElementById('aiText').textContent = getAIComment(predicted, probs);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
