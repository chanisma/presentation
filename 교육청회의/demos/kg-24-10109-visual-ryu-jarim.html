<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>류자림 (3-1-6) 텍스트 지식그래프</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
  #cy { flex: 1; background: #0f172a; }

  /* Controls */
  #controls { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; max-width: 600px; }
  #controls button { padding: 6px 14px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  #controls button:hover { background: #334155; border-color: #60a5fa; }
  #controls button.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  /* Title */
  #title-bar { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
  #title-bar h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
  #title-bar p { font-size: 12px; color: #64748b; margin-top: 2px; }

  /* Filter Panel */
  #filter-panel { position: absolute; top: 70px; left: 16px; z-index: 10; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; width: 260px; }
  #filter-panel h4 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
  .filter-group { margin-bottom: 12px; }
  .filter-group label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
  .filter-check { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; cursor: pointer; }
  .filter-check input { accent-color: #3b82f6; }
  .filter-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  #confidence-slider { width: 100%; accent-color: #3b82f6; }
  #confidence-value { font-size: 12px; color: #60a5fa; font-weight: 600; }

  /* Detail Panel */
  #detail-panel { position: absolute; top: 16px; right: 16px; width: 340px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; z-index: 10; display: none; max-height: calc(100vh - 32px); overflow-y: auto; }
  #detail-panel h3 { font-size: 16px; margin-bottom: 12px; color: #60a5fa; }
  .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #334155; font-size: 13px; }
  .detail-label { color: #94a3b8; min-width: 80px; }
  .detail-value { color: #e2e8f0; font-weight: 500; text-align: right; max-width: 200px; word-break: keep-all; }
  .evidence-box { margin-top: 8px; padding: 10px; background: #0f172a; border-radius: 8px; font-size: 12px; color: #cbd5e1; line-height: 1.6; max-height: 200px; overflow-y: auto; }
  .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; }
  .close-btn:hover { color: #e2e8f0; }

  /* Legend */
  #legend { position: absolute; bottom: 16px; left: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; z-index: 10; }
  #legend h4 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* Stats */
  #stats-bar { position: absolute; bottom: 16px; right: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; z-index: 10; font-size: 12px; }
  .stat-row { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
  .stat-label { color: #94a3b8; }
  .stat-value { color: #60a5fa; font-weight: 600; }
</style>
</head>
<body>
<div id="cy"></div>

<div id="title-bar">
  <h1>류자림 (3-1-6) 텍스트 지식그래프</h1>
  <p>Text-based Knowledge Graph Extraction</p>
</div>

<div id="controls">
  <button onclick="cy.fit(undefined, 50)" title="전체보기">전체보기</button>
  <button onclick="cy.zoom(cy.zoom() * 1.3); cy.center()">+</button>
  <button onclick="cy.zoom(cy.zoom() / 1.3); cy.center()">-</button>
  <button onclick="runLayout('cose')" class="active" id="btn-cose">연결 기반</button>
  <button onclick="runLayout('concentric')" id="btn-concentric">동심원</button>
  <button onclick="runLayout('circle')" id="btn-circle">원형</button>
  <button onclick="runLayout('grade')" id="btn-grade" style="border-color:#f59e0b">학년별</button>
  <button onclick="toggleFilter()" id="btn-filter">필터</button>
</div>

<div id="filter-panel" style="display:none;">
  <h4>필터</h4>
  <div class="filter-group">
    <label>엔티티 유형</label>
    <div id="type-filters"></div>
  </div>
  <div class="filter-group">
    <label>신뢰도 기준: <span id="confidence-value">0.70</span></label>
    <input type="range" id="confidence-slider" min="50" max="100" value="70" oninput="updateConfidence(this.value)">
  </div>
  <div class="filter-group">
    <label>관계 유형 필터</label>
    <div id="predicate-filters"></div>
  </div>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">&times;</button>
  <h3 id="detail-title"></h3>
  <div id="detail-content"></div>
</div>

<div id="legend">
  <h4>엔티티 유형</h4>
  <div id="legend-items"></div>
</div>

<div id="stats-bar">
  <div class="stat-row"><span class="stat-label">노드</span><span class="stat-value" id="stat-nodes">0</span></div>
  <div class="stat-row"><span class="stat-label">관계</span><span class="stat-value" id="stat-edges">0</span></div>
  <div class="stat-row"><span class="stat-label">표시중</span><span class="stat-value" id="stat-visible">0</span></div>
</div>

// === LAYOUT ===
function runLayout(name) {
  document.querySelectorAll('#controls button[id^="btn-"]').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + (name === 'cose' ? 'cose' : name));
  if (btn) btn.classList.add('active');
  var opts;
  if (name === 'cose') {
    opts = { name: 'cose', quality: 'default', nodeDimensionsIncludeLabels: true, idealEdgeLength: 120, nodeRepulsion: 8000, padding: 50 };
  } else if (name === 'concentric') {
    opts = { name: 'concentric', concentric: function(n) { return n.data('type') === 'Student' ? 100 : 50 - (n.connectedEdges().length || 0); }, levelWidth: function() { return 2; }, padding: 50 };
  } else if (name === 'grade') {
    // Step 1: Force 배치 (Student 위치 파악용)
    var forceOpts = { name: 'cose', animate: false, idealEdgeLength: function(){return 120;}, nodeRepulsion: function(){return 8000;}, padding: 50 };
    cy.layout(forceOpts).run();
    // Step 2: Student 노드를 화면 중앙으로 이동, 다른 노드도 같은 만큼 이동
    var studentNode = cy.getElementById('student');
    var sPos = studentNode.position();
    var center = { x: cy.width() / 2, y: cy.height() / 2 };
    var shiftX = center.x - sPos.x;
    var shiftY = center.y - sPos.y;
    cy.nodes().forEach(function(n) {
      var p = n.position();
      n.position({ x: p.x + shiftX, y: p.y + shiftY });
    });
    // Step 3: Student 기준으로 각도 유지, 반지름을 학년에 비례하도록 보정
    var gradeRadius = { 0: 0, 1: 200, 2: 400, 3: 600 };
    cy.nodes().forEach(function(n) {
      var g = n.data('gradeRing');
      if (g === undefined || g === 0) return; // Student는 이미 중앙
      var pos = n.position();
      var dx = pos.x - center.x;
      var dy = pos.y - center.y;
      var currentR = Math.sqrt(dx * dx + dy * dy);
      var angle = Math.atan2(dy, dx);
      // currentR이 0이면 (Student와 겹침) 랜덤 각도 부여
      if (currentR < 5) { angle = Math.random() * Math.PI * 2; currentR = 50; }
      var targetR = gradeRadius[g] || 400;
      // 블렌딩: Force 방향 유지 + 학년 거리 적용
      var blendedR = currentR * 0.25 + targetR * 0.75;
      blendedR += (Math.random() - 0.5) * 50; // 겹침 방지
      n.position({ x: center.x + Math.cos(angle) * blendedR, y: center.y + Math.sin(angle) * blendedR });
    });
    cy.fit(undefined, 50);
    return;
  } else {
    opts = { name: 'circle', padding: 50 };
  }
  cy.layout(opts).run();
}

// === FILTER STATE ===
var activeTypes = {};
var activePredicates = {};
Object.keys(typeColors).forEach(function(t) { activeTypes[t] = true; });
Object.keys(predColors).forEach(function(p) { activePredicates[p] = true; });
var minConfidence = 0.70;

function toggleFilter() {
  var panel = document.getElementById('filter-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function toggleType(type) {
  var chk = document.getElementById('chk-' + type);
  activeTypes[type] = chk.checked;
  applyFilters();
}

function togglePredicate(pred) {
  var chk = document.getElementById('chk-' + pred);
  activePredicates[pred] = chk.checked;
  applyFilters();
}

function updateConfidence(val) {
  minConfidence = val / 100;
  document.getElementById('confidence-value').textContent = minConfidence.toFixed(2);
  applyFilters();
}

function applyFilters() {
  cy.batch(function() {
    cy.nodes().forEach(function(n) {
      var t = n.data('type');
      if (t === 'Student' || activeTypes[t]) {
        n.removeClass('filtered-out');
      } else {
        n.addClass('filtered-out');
      }
    });
    cy.edges().forEach(function(e) {
      var pred = e.data('type');
      var conf = e.data('confidence') || 1;
      var srcVisible = !e.source().hasClass('filtered-out');
      var tgtVisible = !e.target().hasClass('filtered-out');
      if (srcVisible && tgtVisible && activePredicates[pred] && conf >= minConfidence) {
        e.removeClass('filtered-out');
      } else {
        e.addClass('filtered-out');
      }
    });
  });
  updateStats();
}

function updateStats() {
  var visibleNodes = cy.nodes().not('.filtered-out').length;
  var visibleEdges = cy.edges().not('.filtered-out').length;
  document.getElementById('stat-nodes').textContent = String(cy.nodes().length);
  document.getElementById('stat-edges').textContent = String(cy.edges().length);
  document.getElementById('stat-visible').textContent = visibleNodes + 'N / ' + visibleEdges + 'E';
}

// === DETAIL PANEL (safe DOM methods) ===
function makeDetailRow(label, value) {
  var row = document.createElement('div');
  row.className = 'detail-row';
  var spanL = document.createElement('span');
  spanL.className = 'detail-label';
  spanL.textContent = label;
  var spanV = document.createElement('span');
  spanV.className = 'detail-value';
  spanV.textContent = String(value);
  row.appendChild(spanL);
  row.appendChild(spanV);
  return row;
}

function makeEvidenceBox(title, text) {
  var ebox = document.createElement('div');
  ebox.className = 'evidence-box';
  var strong = document.createElement('strong');
  strong.textContent = title;
  ebox.appendChild(strong);
  ebox.appendChild(document.createElement('br'));
  ebox.appendChild(document.createTextNode(text));
  return ebox;
}

function closeDetail() {
  document.getElementById('detail-panel').style.display = 'none';
  cy.elements().removeClass('highlighted faded');
}

cy.on('tap', 'node', function(e) {
  var d = e.target.data();
  var panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = d.label;
  var content = document.getElementById('detail-content');
  content.replaceChildren();
  content.appendChild(makeDetailRow('유형', d.type));
  if (d.confidence) content.appendChild(makeDetailRow('신뢰도', (d.confidence * 100).toFixed(0) + '%'));
  if (d.sourceCount) content.appendChild(makeDetailRow('출처', d.sourceCount + '개 출처'));
  content.appendChild(makeDetailRow('연결 수', e.target.connectedEdges().not('.filtered-out').length));

  if (d.evidence) {
    content.appendChild(makeEvidenceBox('근거:', d.evidence));
  }

  if (d.sources) {
    try {
      var sources = typeof d.sources === 'string' ? JSON.parse(d.sources) : d.sources;
      if (sources.length > 0) {
        var sourceText = sources.map(function(s) {
          return (s.subject || s.category) + ' (' + s.grade + '학년 ' + (s.semester || '') + ')';
        }).join(', ');
        content.appendChild(makeEvidenceBox('Sources:', sourceText));
      }
    } catch(ex) { /* ignore parse errors */ }
  }

  panel.style.display = 'block';
  cy.elements().removeClass('highlighted faded');
  e.target.addClass('highlighted');
  e.target.connectedEdges().not('.filtered-out').addClass('highlighted');
  e.target.neighborhood().nodes().not('.filtered-out').addClass('highlighted');
  cy.elements().not('.filtered-out').not(e.target.neighborhood().add(e.target)).addClass('faded');
});

cy.on('tap', 'edge', function(e) {
  var d = e.target.data();
  var panel = document.getElementById('detail-panel');
  document.getElementById('detail-title').textContent = d.label;
  var content = document.getElementById('detail-content');
  content.replaceChildren();
  content.appendChild(makeDetailRow('관계 유형', d.type));
  content.appendChild(makeDetailRow('출발', e.target.source().data('label')));
  content.appendChild(makeDetailRow('도착', e.target.target().data('label')));
  if (d.confidence) content.appendChild(makeDetailRow('신뢰도', (d.confidence * 100).toFixed(0) + '%'));
  if (d.evidence) {
    content.appendChild(makeEvidenceBox('근거:', d.evidence));
  }
  panel.style.display = 'block';
});

cy.on('tap', function(e) {
  if (e.target === cy) closeDetail();
});

updateStats();
</script>
</body>
